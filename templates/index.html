<!DOCTYPE html>
<html>
<head>
    <title>My Todo App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            background-color: #f0f0f0;
        }
        h1 {
            color: #333;
        }
        input[type="text"] {
            padding: 8px;
            width: 70%;
        }
        button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        ul {
            list-style: none;
            padding: 0;
        }
        li {
            background: white;
            padding: 10px;
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
        }
        a {
            color: red;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>My Todo List</h1>

    <form action="/add" method="POST">
        <input type="text" name="task" placeholder="Enter a task...">
        <button type="submit">Add</button>
    </form>

    <br>

    {% if todos %}
        <ul>
            {% for todo in todos %}
                <li>
                    {{ todo }}
                    <a href="/delete/{{ loop.index0 }}">delete</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No tasks yet! Add one above.</p>
    {% endif %}

    <br>
    <a href="/about">About this app</a>
</body>
</html>
